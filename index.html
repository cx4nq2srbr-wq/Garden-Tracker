<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F9F7F3">
    
    <title>Garden Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        
        <header class="app-header">
            <div class="header-titles">
                <h1>Garden Tracker</h1>
                <p>Map your beds & track growth</p>
            </div>
            
            <div class="mode-toggle">
                <button id="btn-draw" class="active">Draw Beds</button>
                <button id="btn-inspect">Inspect & Edit</button>
            </div>
        </header>

        <main>
            <div id="garden-canvas" class="garden-canvas draw-mode">
                </div>
        </main>

        <div id="plant-modal" class="modal hidden">
            <div class="modal-content">
                <button id="close-modal" class="close-btn" aria-label="Close">
                    <i class="ph ph-x"></i>
                </button>

                <h2>Plant Details</h2>

                <form id="plant-form">
                    <input type="hidden" id="bed-id">
                    
                    <div class="form-group">
                        <label for="crop-name">Crop & Variety</label>
                        <input type="text" id="crop-name" placeholder="e.g. Tomato (San Marzano)" autocomplete="off">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="seed-brand">Brand</label>
                            <input type="text" id="seed-brand" placeholder="e.g. Baker Creek" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="plant-date">Date Planted</label>
                            <input type="date" id="plant-date">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Progress Photos</label>
                        <button type="button" class="photo-upload-btn" id="upload-photo-btn">
                            <i class="ph ph-camera"></i>
                            <span>Tap to upload seed packet or plant</span>
                        </button>
                        <input type="file" id="photo-input" accept="image/*" capture="environment" class="hidden">
                        
                        <div id="photo-gallery" class="photo-gallery"></div>
                    </div>

                    <button type="submit" class="save-btn">Save Details</button>
                </form>
            </div>
        </div>
        
    </div>

    <script src="app.js"></script>
</body>
</html>
